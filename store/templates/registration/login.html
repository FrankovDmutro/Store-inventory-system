<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Вхід у систему</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); background: white; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <h1 style="font-size: 3rem;">🛒</h1>
        <h3>Вхід для персоналу</h3>
        <p class="text-muted">Система обліку товарів</p>
    </div>

    <form method="post">
        {% csrf_token %}
        
        {% if form.errors %}
            <div class="alert alert-danger text-center p-2 small">Невірний логін або пароль</div>
        {% endif %}

        <div class="mb-3">
            <label class="form-label">Логін</label>
            <input type="text" name="username" class="form-control form-control-lg" required autofocus>
        </div>

        <div class="mb-4">
            <label class="form-label">Пароль</label>
            <input type="password" name="password" class="form-control form-control-lg" required>
        </div>

        <button type="submit" class="btn btn-primary w-100 btn-lg">Увійти</button>
    </form>
    
    <div class="text-center mt-3">
        <small class="text-muted">Немає доступу? Зверніться до адміністратора.</small>
    </div>
</div>

</body>
</html>
